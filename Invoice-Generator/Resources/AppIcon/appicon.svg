<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">

    <defs>
        <!-- Dark background -->
        <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#4a4a4a"/>
            <stop offset="100%" stop-color="#2f2f2f"/>
        </linearGradient>

        <!-- Silver document gradient -->
        <linearGradient id="doc" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#f2f2f2"/>
            <stop offset="100%" stop-color="#cfcfcf"/>
        </linearGradient>

        <!-- Shadow -->
        <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="20" stdDeviation="20" flood-opacity="0.35"/>
        </filter>

    </defs>

    <!-- Background -->
    <rect width="1024" height="1024" rx="220" fill="url(#bg)"/>

    <!-- Document -->
    <g filter="url(#shadow)">

        <!-- Document body -->
        <path d="M280 180 H600 L760 340 V820 H280 Z" fill="url(#doc)"/>

        <!-- Folded corner -->
        <polygon points="600,180 760,340 600,340" fill="#bfbfbf"/>

        <!-- £ symbol -->
        <text x="520"
              y="460"
              font-size="150"
              text-anchor="middle"
              fill="#111"
              font-family="Arial, Helvetica, sans-serif"
              font-weight="bold">£</text>

        <!-- Invoice lines -->
        <rect x="380" y="560" width="300" height="20" fill="#111"/>
        <rect x="380" y="610" width="240" height="20" fill="#111"/>
        <rect x="380" y="660" width="190" height="20" fill="#111"/>

    </g>

</svg>